{{ define "main" }}
<section class="quko-page-title"><div class="container"><span class="quko-eyebrow">{{ .Params.eyebrow }}</span><h1>{{ .Title }}</h1><p>{{ .Description }}</p></div></section>
{{ with .Params.groups }}
<section class="quko-section"><div class="container">
  {{ range . }}<div class="quko-section-title" data-reveal><h2>{{ .title }}</h2></div><div class="quko-grid-3" style="margin-bottom:60px">{{ range .items }}<article class="quko-card" data-reveal><h3>{{ .question }}</h3><p>{{ .answer }}</p></article>{{ end }}</div>{{ end }}
</div></section>
{{ end }}
{{ partial "marketing-cta.html" . }}
{{ end }}
