{{ define "main" }}

{{ partial "page-title.html" . }}

{{ with .Params.legal }}
{{ if .enable }}
<section class="about section">
  <div class="container">
    <div class="row">

      
      <div class="col">
        {{ with .title }}<h2 class="mt-40">{{ . | markdownify }}</h2>{{ end }}
        {{ with .content }}<div class="mt-30" style="font-size: 18px; line-height: 1.8; color: #555;">{{ . | $.Page.RenderString (dict "display" "block") }}</div>{{ end }}
      </div>
    </div>


  </div>
</section>
{{ end }}
{{ end }}



{{ end }}
