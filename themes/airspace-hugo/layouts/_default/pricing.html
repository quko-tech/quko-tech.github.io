{{ define "main" }}
<section class="quko-page-title"><div class="container"><span class="quko-eyebrow">{{ .Params.eyebrow }}</span><h1>{{ .Title }}</h1><p>{{ .Description }}</p></div></section>
{{ with .Params.options }}
<section class="quko-section"><div class="container">
  <div class="quko-grid-3">{{ range . }}<article class="quko-card" data-reveal><span class="quko-icon"><i class="{{ .icon }}"></i></span><h3>{{ .title }}</h3><p>{{ .text }}</p><ul class="quko-check-list">{{ range .items }}<li><i class="fas fa-check-circle"></i><span>{{ . }}</span></li>{{ end }}</ul></article>{{ end }}</div>
</div></section>
{{ end }}
{{ partial "marketing-cta.html" . }}
{{ end }}
